<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Suya Yaz">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23cfe4ef'/><circle cx='90' cy='90' r='20' fill='none' stroke='%23ffffff' stroke-width='3' opacity='0.9'/><circle cx='90' cy='90' r='40' fill='none' stroke='%23ffffff' stroke-width='2.5' opacity='0.6'/><circle cx='90' cy='90' r='60' fill='none' stroke='%23ffffff' stroke-width='2' opacity='0.35'/></svg>">
<title>Suya Yaz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  background: #0a0a0a; color: #e8e8e8;
  user-select: none; -webkit-user-select: none;
  overscroll-behavior: none;
}
.app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; position: relative; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: max(env(safe-area-inset-top), 14px) 18px 10px;
}
.title { font-size: 16px; font-weight: 500; letter-spacing: 0.3px; color: #f0f0f0; }
.icon-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 11px; background: rgba(255,255,255,0.07);
  border: none; color: #e8e8e8; font-size: 18px; cursor: pointer;
}
.icon-btn:active { background: rgba(255,255,255,0.14); }
.modes { display: flex; gap: 6px; padding: 6px 16px; }
.mode {
  flex: 1; padding: 11px 8px; border: none; border-radius: 12px;
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.55);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.25s, color 0.25s;
}
.mode.active { background: rgba(255,255,255,0.18); color: #fff; }
.stage {
  flex: 1; position: relative; margin: 8px 16px;
  border-radius: 22px; overflow: hidden;
  background: #cfe4ef; transition: background 0.4s;
}
.stage.sand { background: #e6d4ad; }
.stage.steam { background: #2a3340; }
.stage canvas { display: block; width: 100%; height: 100%; touch-action: none; }
.hint {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; font-size: 13px; line-height: 1.65;
  text-align: center; padding: 0 32px;
  color: rgba(40,70,100,0.55); transition: opacity 0.5s;
}
.stage.sand .hint { color: rgba(80,55,20,0.55); }
.stage.steam .hint { color: rgba(220,225,235,0.5); }
.hint.hidden { opacity: 0; }
.actions {
  display: flex; gap: 8px;
  padding: 6px 16px max(env(safe-area-inset-bottom), 16px);
}
.action {
  flex: 1; padding: 14px; border: none; border-radius: 14px;
  background: rgba(255,255,255,0.08); color: #f0f0f0;
  font-size: 15px; font-weight: 500; cursor: pointer;
  transition: transform 0.1s, background 0.15s;
}
.action.primary { background: #4a90c8; }
.action.primary:active { background: #3d7eae; }
.action:active { transform: scale(0.97); }
.toast {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  padding: 12px 20px; border-radius: 12px;
  background: rgba(0,0,0,0.75); color: #fff;
  font-size: 13px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s; z-index: 50;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.gallery-overlay {
  position: absolute; inset: 0; background: #0a0a0a; z-index: 100;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.3, 0, 0.2, 1);
}
.gallery-overlay.open { transform: translateX(0); }
.gallery-header {
  display: flex; align-items: center;
  padding: max(env(safe-area-inset-top), 14px) 18px 14px;
  gap: 12px; border-bottom: 0.5px solid rgba(255,255,255,0.08);
}
.gallery-grid {
  flex: 1; overflow-y: auto; padding: 16px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  -webkit-overflow-scrolling: touch;
}
.gallery-item {
  aspect-ratio: 3/4; border-radius: 14px;
  overflow: hidden; position: relative;
  background-size: cover; background-position: center; cursor: pointer;
}
.gallery-item:active { transform: scale(0.97); transition: transform 0.1s; }
.gallery-meta {
  position: absolute; left: 8px; bottom: 8px;
  font-size: 10px; padding: 4px 8px; border-radius: 6px;
  background: rgba(0,0,0,0.55); color: #fff;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.gallery-empty {
  grid-column: 1 / -1; text-align: center;
  padding: 80px 0; color: rgba(255,255,255,0.4);
  font-size: 14px; line-height: 1.6;
}
.detail-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.96); z-index: 200;
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.detail-overlay.open { display: flex; }
.detail-image { max-width: 100%; max-height: 75vh; border-radius: 14px; }
.detail-close {
  position: absolute; top: max(env(safe-area-inset-top), 14px); right: 18px;
  width: 38px; height: 38px; border-radius: 19px;
  background: rgba(255,255,255,0.14); border: none;
  color: #fff; font-size: 20px; cursor: pointer;
}
.detail-info {
  position: absolute; top: max(env(safe-area-inset-top), 14px); left: 18px;
  font-size: 13px; color: rgba(255,255,255,0.6);
}
.detail-delete {
  position: absolute; bottom: max(env(safe-area-inset-bottom), 20px);
  left: 50%; transform: translateX(-50%);
  padding: 12px 28px; border: 0.5px solid rgba(255,100,100,0.4);
  border-radius: 12px; background: rgba(255,80,80,0.12);
  color: #ff9090; font-size: 14px; cursor: pointer;
}
.detail-delete:active { background: rgba(255,80,80,0.22); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="title">Suya Yaz</div>
    <button class="icon-btn" id="open-gallery" aria-label="Galeri">▦</button>
  </div>
  <div class="modes">
    <button class="mode active" data-mode="water">Su</button>
    <button class="mode" data-mode="sand">Kum</button>
    <button class="mode" data-mode="steam">Buğu</button>
  </div>
  <div class="stage water" id="stage">
    <canvas id="canvas"></canvas>
    <div class="hint" id="hint">Parmağınla yaz, çiz<br>iz kalır, sonra kaybolur</div>
  </div>
  <div class="actions">
    <button class="action" id="clear">Temizle</button>
    <button class="action primary" id="save">Kaydet</button>
  </div>
  <div class="toast" id="toast">Kaydedildi</div>
  <div class="gallery-overlay" id="gallery-overlay">
    <div class="gallery-header">
      <button class="icon-btn" id="close-gallery">←</button>
      <div class="title">Geçmiş kayıtlar</div>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-info" id="detail-info"></div>
    <button class="detail-close" id="detail-close">×</button>
    <img class="detail-image" id="detail-image" alt="">
    <button class="detail-delete" id="detail-delete">Sil</button>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'suyayaz_entries_v1';
  const MAX_ENTRIES = 80;
  const FOG_COLOR = 'rgba(235, 240, 245, 0.94)';
  const FOG_RECONDENSE = 'rgba(235, 240, 245, 0.0022)';

  const canvas = document.getElementById('canvas');
  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const toast = document.getElementById('toast');
  const ctx = canvas.getContext('2d');

  let mode = 'water';
  let isDrawing = false;
  let hasDrawn = false;
  let lastX = 0, lastY = 0, lastT = 0;
  let ripples = [];
  let trails = [];
  let wakes = [];
  let drops = [];
  let recordCanvas, recordCtx;
  let sandBg = null;
  let steamBgImg = null;
  let steamMask, steamMaskCtx;
  let recordSteamMask, recordSteamMaskCtx;
  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1400);
  }
  function loadEntries() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch(e) { return []; }
  }
  function saveEntries(arr) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
    catch(e) {
      while (arr.length > 0) {
        arr.shift();
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); return; }
        catch(e2) {}
      }
    }
  }

  function makeSandBg(w, h) {
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    const o = off.getContext('2d');
    o.fillStyle = '#e6d4ad'; o.fillRect(0, 0, w, h);
    const img = o.getImageData(0, 0, w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * 34;
      d[i] = Math.max(0, Math.min(255, d[i] + n));
      d[i+1] = Math.max(0, Math.min(255, d[i+1] + n - 6));
      d[i+2] = Math.max(0, Math.min(255, d[i+2] + n - 14));
    }
    o.putImageData(img, 0, 0);
    for (let i = 0; i < 600; i++) {
      const x = Math.random() * w, y = Math.random() * h;
      const r = Math.random() * 2.5 + 0.5;
      o.fillStyle = Math.random() < 0.5 ? 'rgba(190,160,110,0.5)' : 'rgba(250,235,200,0.4)';
      o.beginPath(); o.arc(x, y, r, 0, Math.PI * 2); o.fill();
    }
    return off;
  }

  function makeSteamBg(w, h) {
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    const o = off.getContext('2d');
    const grad = o.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#5a4a3e');
    grad.addColorStop(0.4, '#6e5444');
    grad.addColorStop(0.8, '#3a3038');
    grad.addColorStop(1, '#28242a');
    o.fillStyle = grad;
    o.fillRect(0, 0, w, h);
    for (let i = 0; i < 14; i++) {
      const x = Math.random() * w, y = Math.random() * h;
      const r = 50 + Math.random() * 90;
      const g2 = o.createRadialGradient(x, y, 0, x, y, r);
      g2.addColorStop(0, 'rgba(255,180,120,0.15)');
      g2.addColorStop(1, 'rgba(255,180,120,0)');
      o.fillStyle = g2;
      o.fillRect(x - r, y - r, r * 2, r * 2);
    }
    for (let i = 0; i < 6; i++) {
      const x = Math.random() * w, y = Math.random() * h;
      const r = 30 + Math.random() * 60;
      const g2 = o.createRadialGradient(x, y, 0, x, y, r);
      g2.addColorStop(0, 'rgba(60,40,80,0.18)');
      g2.addColorStop(1, 'rgba(60,40,80,0)');
      o.fillStyle = g2;
      o.fillRect(x - r, y - r, r * 2, r * 2);
    }
    return off;
  }

  function drawWaterBg(c, w, h) {
    c.fillStyle = '#cfe4ef'; c.fillRect(0, 0, w, h);
    c.strokeStyle = 'rgba(255,255,255,0.18)'; c.lineWidth = 0.5;
    for (let y = 0; y < h; y += 6) {
      c.beginPath(); c.moveTo(0, y);
      for (let x = 0; x < w; x += 24) {
        c.lineTo(x, y + Math.sin(x * 0.05 + y * 0.1) * 1.5);
      }
      c.stroke();
    }
  }

  function drawBackground() {
    const rect = stage.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    if (mode === 'water') {
      drawWaterBg(ctx, w, h);
    } else if (mode === 'sand') {
      if (!sandBg || sandBg.width !== canvas.width) sandBg = makeSandBg(canvas.width, canvas.height);
      ctx.drawImage(sandBg, 0, 0, w, h);
    } else {
      if (!steamBgImg || steamBgImg.width !== canvas.width) steamBgImg = makeSteamBg(canvas.width, canvas.height);
      ctx.drawImage(steamBgImg, 0, 0, w, h);
      if (steamMask) ctx.drawImage(steamMask, 0, 0, w, h);
    }
  }

  function initSteamMasks() {
    const rect = stage.getBoundingClientRect();
    steamMask = document.createElement('canvas');
    steamMask.width = canvas.width; steamMask.height = canvas.height;
    steamMaskCtx = steamMask.getContext('2d');
    steamMaskCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    steamMaskCtx.fillStyle = FOG_COLOR;
    steamMaskCtx.fillRect(0, 0, rect.width, rect.height);

    recordSteamMask = document.createElement('canvas');
    recordSteamMask.width = canvas.width; recordSteamMask.height = canvas.height;
    recordSteamMaskCtx = recordSteamMask.getContext('2d');
    recordSteamMaskCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    recordSteamMaskCtx.fillStyle = FOG_COLOR;
    recordSteamMaskCtx.fillRect(0, 0, rect.width, rect.height);
  }

  function initRecord() {
    const rect = stage.getBoundingClientRect();
    recordCanvas = document.createElement('canvas');
    recordCanvas.width = canvas.width; recordCanvas.height = canvas.height;
    recordCtx = recordCanvas.getContext('2d');
    recordCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (mode === 'water') {
      drawWaterBg(recordCtx, rect.width, rect.height);
    } else if (mode === 'sand') {
      if (!sandBg || sandBg.width !== canvas.width) sandBg = makeSandBg(canvas.width, canvas.height);
      recordCtx.drawImage(sandBg, 0, 0, rect.width, rect.height);
    } else {
      if (!steamBgImg || steamBgImg.width !== canvas.width) steamBgImg = makeSteamBg(canvas.width, canvas.height);
      recordCtx.drawImage(steamBgImg, 0, 0, rect.width, rect.height);
      initSteamMasks();
    }
  }

  function recordStroke(x1, y1, x2, y2) {
    if (mode === 'water') {
      recordCtx.strokeStyle = 'rgba(60, 105, 150, 0.55)';
      recordCtx.lineWidth = 2.2; recordCtx.lineCap = 'round';
      recordCtx.beginPath(); recordCtx.moveTo(x1, y1); recordCtx.lineTo(x2, y2); recordCtx.stroke();
    }
  }

  function recordWakeOnRecord(x, y, propAngle, alpha) {
    const segAngle = propAngle + Math.PI / 2;
    const segLen = 3;
    recordCtx.strokeStyle = 'rgba(70, 120, 160, ' + (alpha * 0.4) + ')';
    recordCtx.lineWidth = 0.7;
    recordCtx.beginPath();
    recordCtx.moveTo(x - Math.cos(segAngle) * segLen, y - Math.sin(segAngle) * segLen);
    recordCtx.lineTo(x + Math.cos(segAngle) * segLen, y + Math.sin(segAngle) * segLen);
    recordCtx.stroke();
  }

  function drawSandStrokeOn(c, s) {
    c.strokeStyle = 'rgba(255, 240, 210, 0.55)';
    c.lineWidth = s.size + 3;
    c.lineCap = 'round'; c.lineJoin = 'round';
    c.beginPath(); c.moveTo(s.x1, s.y1); c.lineTo(s.x2, s.y2); c.stroke();
    c.strokeStyle = 'rgba(100, 70, 35, 0.78)';
    c.lineWidth = s.size;
    c.beginPath(); c.moveTo(s.x1, s.y1); c.lineTo(s.x2, s.y2); c.stroke();
    const dist = Math.hypot(s.x2 - s.x1, s.y2 - s.y1);
    const steps = Math.max(3, dist * 1.4);
    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      const px = s.x1 + (s.x2 - s.x1) * t + (Math.random() - 0.5) * (s.size + 2);
      const py = s.y1 + (s.y2 - s.y1) * t + (Math.random() - 0.5) * (s.size + 2);
      c.fillStyle = Math.random() < 0.5 ? 'rgba(70,45,15,0.4)' : 'rgba(255,235,195,0.5)';
      c.fillRect(px, py, 1, 1);
    }
  }

  function wipeFogLine(c, x1, y1, x2, y2, w) {
    c.save();
    c.globalCompositeOperation = 'destination-out';
    c.strokeStyle = 'rgba(0,0,0,1)';
    c.lineWidth = w; c.lineCap = 'round'; c.lineJoin = 'round';
    c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
    c.restore();
  }

  function wipeFogEllipse(c, x, y, rx, ry, alpha) {
    c.save();
    c.globalCompositeOperation = 'destination-out';
    c.fillStyle = 'rgba(0,0,0,' + alpha + ')';
    c.beginPath();
    c.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }

  function spawnDrop(x, y) {
    if (drops.length >= 28) return;
    drops.push({
      x: x + (Math.random() - 0.5) * 8,
      y: y + (Math.random() - 0.5) * 2,
      vy: 0,
      stuck: 18 + Math.random() * 40,
      size: 1.6 + Math.random() * 2.6,
      life: 280 + Math.random() * 80
    });
  }

  function spawnWakes(x, y, moveAngle, speed) {
    if (wakes.length >= 170) return;
    [1, -1].forEach(side => {
      wakes.push({
        x: x + (Math.random() - 0.5) * 2.5,
        y: y + (Math.random() - 0.5) * 2.5,
        moveAngle: moveAngle,
        side: side,
        speed: 1.0 + Math.random() * 0.4 + speed * 0.06,
        age: 0,
        life: 70 + Math.random() * 22,
        recorded: false
      });
    });
  }

  function animate() {
    const rect = stage.getBoundingClientRect();
    const w = rect.width, h = rect.height;

    if (mode === 'water') {
      drawWaterBg(ctx, w, h);

      ripples = ripples.filter(r => r.age < 95);
      ripples.forEach(r => {
        r.age++; r.radius += 1.4;
        const alpha = Math.max(0, (1 - r.age / 95)) * 0.55;
        ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2); ctx.stroke();
        if (r.radius > 6) {
          ctx.strokeStyle = 'rgba(70,110,150,' + (alpha * 0.5) + ')';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(r.x, r.y, r.radius - 5, 0, Math.PI * 2); ctx.stroke();
        }
      });

      trails = trails.filter(t => t.age < 150);
      trails.forEach(t => {
        t.age++;
        const alpha = Math.max(0, (1 - t.age / 150)) * 0.75;
        ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
        ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(t.x1, t.y1); ctx.lineTo(t.x2, t.y2); ctx.stroke();
        ctx.strokeStyle = 'rgba(50,95,140,' + (alpha * 0.45) + ')';
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(t.x1 + 0.8, t.y1 + 0.8); ctx.lineTo(t.x2 + 0.8, t.y2 + 0.8); ctx.stroke();
      });

      wakes = wakes.filter(wk => wk.age < wk.life);
      wakes.forEach(wk => {
        wk.age++;
        const propAngle = wk.moveAngle + Math.PI + wk.side * 0.36;
        const distOut = wk.age * wk.speed;
        const px = wk.x + Math.cos(propAngle) * distOut;
        const py = wk.y + Math.sin(propAngle) * distOut;
        const ageRatio = wk.age / wk.life;
        const alpha = Math.max(0, (1 - ageRatio)) * 0.44;
        const segAngle = propAngle + Math.PI / 2;
        const segLen = 2 + wk.age * 0.07;

        ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(px - Math.cos(segAngle) * segLen, py - Math.sin(segAngle) * segLen);
        ctx.lineTo(px + Math.cos(segAngle) * segLen, py + Math.sin(segAngle) * segLen);
        ctx.stroke();

        if (wk.age > 6) {
          ctx.strokeStyle = 'rgba(70,115,155,' + (alpha * 0.55) + ')';
          ctx.lineWidth = 0.55;
          ctx.beginPath();
          ctx.moveTo(px - Math.cos(segAngle) * segLen * 0.7 + 0.6, py - Math.sin(segAngle) * segLen * 0.7 + 0.6);
          ctx.lineTo(px + Math.cos(segAngle) * segLen * 0.7 + 0.6, py + Math.sin(segAngle) * segLen * 0.7 + 0.6);
          ctx.stroke();
        }

        if (!wk.recorded && wk.age === 14) {
          recordWakeOnRecord(px, py, propAngle, 0.35);
          wk.recorded = true;
        }
      });
    } else if (mode === 'steam' && steamMaskCtx) {
      steamMaskCtx.fillStyle = FOG_RECONDENSE;
      steamMaskCtx.fillRect(0, 0, w, h);

      drops = drops.filter(d => d.y < h + 12 && d.life > 0);
      drops.forEach(d => {
        if (d.stuck > 0) {
          d.stuck--;
          d.vy = 0;
        } else {
          d.vy += 0.045 + d.size * 0.008;
          d.y += d.vy;
        }
        d.life -= 0.32;
        const wipeRx = d.size * 0.75;
        const wipeRy = d.size * 1.15;
        wipeFogEllipse(steamMaskCtx, d.x, d.y, wipeRx, wipeRy, 0.82);
        wipeFogEllipse(recordSteamMaskCtx, d.x, d.y, wipeRx, wipeRy, 0.55);
      });

      ctx.drawImage(steamBgImg, 0, 0, w, h);
      ctx.drawImage(steamMask, 0, 0, w, h);

      drops.forEach(d => {
        const lifeAlpha = Math.min(1, d.life / 80);
        ctx.fillStyle = 'rgba(180, 210, 230, ' + (lifeAlpha * 0.32) + ')';
        ctx.beginPath();
        ctx.ellipse(d.x, d.y, d.size * 0.72, d.size * 1.1, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(100, 140, 170, ' + (lifeAlpha * 0.35) + ')';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.ellipse(d.x, d.y, d.size * 0.72, d.size * 1.1, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255, 255, 255, ' + (lifeAlpha * 0.65) + ')';
        ctx.beginPath();
        ctx.ellipse(d.x - d.size * 0.22, d.y - d.size * 0.42, d.size * 0.18, d.size * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    requestAnimationFrame(animate);
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function startDraw(e) {
    e.preventDefault();
    if (!hasDrawn) { hint.classList.add('hidden'); hasDrawn = true; }
    isDrawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y; lastT = Date.now();
    if (mode === 'water') {
      ripples.push({ x: p.x, y: p.y, radius: 2, age: 0 });
    } else if (mode === 'steam') {
      spawnDrop(p.x, p.y);
    }
  }

  function drawMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const p = getPos(e);
    const now = Date.now();
    if (mode === 'water') {
      const dx = p.x - lastX, dy = p.y - lastY;
      const dist = Math.hypot(dx, dy);
      trails.push({ x1: lastX, y1: lastY, x2: p.x, y2: p.y, age: 0 });
      recordStroke(lastX, lastY, p.x, p.y);
      if (dist > 1.2) {
        const moveAngle = Math.atan2(dy, dx);
        const dt = Math.max(8, now - lastT);
        const speed = dist / dt * 16;
        spawnWakes(lastX, lastY, moveAngle, speed);
        if (Math.random() < 0.55) ripples.push({ x: p.x, y: p.y, radius: 1, age: 0 });
      } else if (Math.random() < 0.2) {
        ripples.push({ x: p.x, y: p.y, radius: 1, age: 0 });
      }
    } else if (mode === 'sand') {
      const dt = Math.max(8, now - lastT);
      const v = Math.hypot(p.x - lastX, p.y - lastY) / dt;
      const size = Math.max(4, Math.min(11, 9 - v * 30));
      const s = { x1: lastX, y1: lastY, x2: p.x, y2: p.y, size: size };
      drawSandStrokeOn(ctx, s);
      drawSandStrokeOn(recordCtx, s);
    } else {
      wipeFogLine(steamMaskCtx, lastX, lastY, p.x, p.y, 22);
      wipeFogLine(recordSteamMaskCtx, lastX, lastY, p.x, p.y, 22);
      const dist = Math.hypot(p.x - lastX, p.y - lastY);
      if (Math.random() < dist / 28) spawnDrop(p.x, p.y);
    }
    lastX = p.x; lastY = p.y; lastT = now;
  }

  function endDraw(e) { if (e) e.preventDefault(); isDrawing = false; }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', drawMove);
  window.addEventListener('mouseup', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', drawMove, { passive: false });
  canvas.addEventListener('touchend', endDraw, { passive: false });
  canvas.addEventListener('touchcancel', endDraw, { passive: false });

  function resetEphemeral() {
    ripples = []; trails = []; wakes = []; drops = [];
  }

  function setMode(newMode) {
    mode = newMode;
    stage.classList.remove('water', 'sand', 'steam');
    stage.classList.add(mode);
    document.querySelectorAll('.mode').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    resetEphemeral();
    if (!hasDrawn) hint.classList.remove('hidden');
    initRecord();
    drawBackground();
  }

  document.querySelectorAll('.mode').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  document.getElementById('clear').addEventListener('click', () => {
    resetEphemeral();
    initRecord();
    drawBackground();
    hint.classList.remove('hidden');
    hasDrawn = false;
  });

  document.getElementById('save').addEventListener('click', () => {
    if (!hasDrawn) { showToast('Önce bir şey çiz'); return; }
    let dataUrl;
    if (mode === 'steam') {
      const finalC = document.createElement('canvas');
      finalC.width = recordCanvas.width; finalC.height = recordCanvas.height;
      const fctx = finalC.getContext('2d');
      fctx.drawImage(recordCanvas, 0, 0);
      fctx.drawImage(recordSteamMask, 0, 0);
      dataUrl = finalC.toDataURL('image/jpeg', 0.82);
    } else {
      dataUrl = recordCanvas.toDataURL('image/jpeg', 0.82);
    }
    const entries = loadEntries();
    entries.unshift({ data: dataUrl, mode: mode, time: Date.now() });
    if (entries.length > MAX_ENTRIES) entries.length = MAX_ENTRIES;
    saveEntries(entries);
    showToast('Kaydedildi');
    resetEphemeral();
    initRecord();
    drawBackground();
    hint.classList.remove('hidden');
    hasDrawn = false;
  });

  function formatDate(ts) {
    const d = new Date(ts);
    const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return d.getDate() + ' ' + months[d.getMonth()] + ' · ' + h + ':' + m;
  }

  function renderGallery() {
    const grid = document.getElementById('gallery-grid');
    const entries = loadEntries();
    if (entries.length === 0) {
      grid.innerHTML = '<div class="gallery-empty">Henüz bir kayıt yok.<br>Çizdiklerin burada toplanacak.</div>';
      return;
    }
    grid.innerHTML = '';
    entries.forEach((entry, idx) => {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.style.backgroundImage = 'url(' + entry.data + ')';
      const meta = document.createElement('div');
      meta.className = 'gallery-meta';
      const modeLabel = entry.mode === 'water' ? 'Su' : entry.mode === 'sand' ? 'Kum' : 'Buğu';
      meta.textContent = modeLabel + ' · ' + formatDate(entry.time);
      div.appendChild(meta);
      div.addEventListener('click', () => openDetail(idx));
      grid.appendChild(div);
    });
  }

  document.getElementById('open-gallery').addEventListener('click', () => {
    renderGallery();
    document.getElementById('gallery-overlay').classList.add('open');
  });
  document.getElementById('close-gallery').addEventListener('click', () => {
    document.getElementById('gallery-overlay').classList.remove('open');
  });

  let currentDetailIdx = -1;
  function openDetail(idx) {
    const entries = loadEntries();
    const entry = entries[idx];
    if (!entry) return;
    currentDetailIdx = idx;
    document.getElementById('detail-image').src = entry.data;
    const modeLabel = entry.mode === 'water' ? 'Su' : entry.mode === 'sand' ? 'Kum' : 'Buğu';
    document.getElementById('detail-info').textContent = modeLabel + ' · ' + formatDate(entry.time);
    document.getElementById('detail-overlay').classList.add('open');
  }
  document.getElementById('detail-close').addEventListener('click', () => {
    document.getElementById('detail-overlay').classList.remove('open');
    currentDetailIdx = -1;
  });
  document.getElementById('detail-delete').addEventListener('click', () => {
    if (currentDetailIdx < 0) return;
    if (!confirm('Bu kaydı silmek istediğine emin misin?')) return;
    const entries = loadEntries();
    entries.splice(currentDetailIdx, 1);
    saveEntries(entries);
    document.getElementById('detail-overlay').classList.remove('open');
    currentDetailIdx = -1;
    renderGallery();
  });

  function resize() {
    const rect = stage.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    sandBg = null; steamBgImg = null;
    resetEphemeral();
    initRecord();
    drawBackground();
  }

  window.addEventListener('resize', () => setTimeout(resize, 100));
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));

  resize();
  animate();
})();
</script>
</body>
</html>
